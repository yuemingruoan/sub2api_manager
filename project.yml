name: GetMoney
options:
  bundleIdPrefix: com.shiyu
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
targets:
  GetMoney:
    type: application
    platform: macOS
    sources:
      - GetMoney
    preBuildScripts:
      - script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          cp "${SRCROOT}/GetMoney/AppIcon.icns" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/"
        name: Copy App Icon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shiyu.GetMoney
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: GetMoney/GetMoney.entitlements
        INFOPLIST_FILE: GetMoney/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
